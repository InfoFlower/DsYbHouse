<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retrieve Videos - Housify</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="../logo.svg" alt="Housify Logo" class="logo">
        </div>
        <h1>Retrieve Videos from Channel</h1>
        <a href="../index/page.html" class="back-btn">← Back to Home</a>
    </header>
    <nav class="top-menu" aria-label="Main navigation">
        <ul>
            <li><a href="../index/page.html">Home</a></li>
            <li><a href="page.html">Retrieve Videos</a></li>
            <li><a href="../view_videos/page.html">Saved Videos</a></li>
        </ul>
    </nav>
    <main class="panel">
        <form id="retrieve-form">
            <select id="type">
                <option value="USER">Channel</option>
                <option value="PLAYLIST">Playlist</option>
            </select>
            <input type="text" id="search" placeholder="Enter channel username or playlist ID" required>
            <label for="save-db">
                <input type="checkbox" id="save-db"> Enregistrer dans la BDD
            </label>
            <button type="submit">Retrieve Videos</button>
        </form>
        <div id="results"></div>
    </main>
    <script src="script.js"></script>
</body>
</html>
