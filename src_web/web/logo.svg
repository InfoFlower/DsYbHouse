<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle (vinyl) -->
  <circle cx="50" cy="50" r="45" fill="url(#vinylGradient)" stroke="#00cc66" stroke-width="2"/>
  
  <!-- Inner circle (label) -->
  <circle cx="50" cy="50" r="15" fill="#0a0a0a" stroke="#00cc66" stroke-width="1"/>
  
  <!-- Center hole -->
  <circle cx="50" cy="50" r="3" fill="#000"/>
  
  <!-- Spaceship/Bike silhouette -->
  <path d="M35 40 L45 35 L55 35 L65 40 L70 45 L65 50 L55 55 L45 55 L35 50 Z" fill="none" stroke="#00ff88" stroke-width="2"/>
  <!-- Wings -->
  <path d="M40 42 L30 38 L35 45 Z" fill="#cc0033"/>
  <path d="M60 42 L70 38 L65 45 Z" fill="#cc0033"/>
  <!-- Engine trails -->
  <path d="M35 48 L25 50 L20 52" stroke="#00ff88" stroke-width="1" fill="none"/>
  <path d="M65 48 L75 50 L80 52" stroke="#00ff88" stroke-width="1" fill="none"/>
  
  <!-- Vinyl grooves (simplified) -->
  <circle cx="50" cy="50" r="20" fill="none" stroke="#333" stroke-width="0.5" opacity="0.5"/>
  <circle cx="50" cy="50" r="25" fill="none" stroke="#333" stroke-width="0.5" opacity="0.5"/>
  <circle cx="50" cy="50" r="30" fill="none" stroke="#333" stroke-width="0.5" opacity="0.5"/>
  <circle cx="50" cy="50" r="35" fill="none" stroke="#333" stroke-width="0.5" opacity="0.5"/>
  <circle cx="50" cy="50" r="40" fill="none" stroke="#333" stroke-width="0.5" opacity="0.5"/>
  
  <!-- Gradients -->
  <defs>
    <radialGradient id="vinylGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </radialGradient>
  </defs>
</svg>